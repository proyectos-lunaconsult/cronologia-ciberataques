function useCounter(target, duration, active) {
  const [val, setVal] = useState(0);
  const started = useRef(false);

  useEffect(() => {
    if (!active || started.current) {
      return;
    }
    started.current = true;
    const startTime = performance.now();
    const dur = duration || 1600;

    function step(now) {
      const progress = Math.min((now - startTime) / dur, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      setVal(Math.round(target * eased));
      if (progress < 1) {
        requestAnimationFrame(step);
      }
    }

    requestAnimationFrame(step);
  }, [active, target, duration]);

  return val;
}

function useInView() {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);

  useEffect(() => {
    const el = ref.current;
    if (!el) {
      return;
    }
    const observer = new IntersectionObserver(
      function (entries) {
        if (entries[0].isIntersecting) {
          setVisible(true);
        }
      },
      { threshold: 0.15 }
    );
    observer.observe(el);
    return function () {
      observer.disconnect();
    };
  }, []);

  return [ref, visible];
}

function formatNum(n) {
  if (n >= 1000) {
    return (n / 1000).toFixed(n % 1000 === 0 ? 0 : 1) + "K";
  }
  return String(n);
}

function HorizontalTimeline({ filters }) {
  const scrollRef = useRef(null);
  const filtered = ALL_EVENTS.filter((e) => filters.includes(e.attack));
  const [selected, setSelected] = useState(null);
  const [dragging, setDragging] = useState(false);
  const startX = useRef(0);
  const scrollLeft = useRef(0);
  const minY = 2005;
  const maxY = 2024;
  const range = maxY - minY;

  function handleDown(e) {
    setDragging(true);
    startX.current = e.pageX - scrollRef.current.offsetLeft;
    scrollLeft.current = scrollRef.current.scrollLeft;
  }
  function handleUp() {
    setDragging(false);
  }
  function handleMove(e) {
    if (!dragging) return;
    e.preventDefault();
    const x = e.pageX - scrollRef.current.offsetLeft;
    scrollRef.current.scrollLeft = scrollLeft.current - (x - startX.current);
  }

  const years = [];
  for (let yr = minY; yr <= maxY; yr++) {
    years.push(yr);
  }

  return (
    <div style={{ marginBottom: "2rem" }}>
      <div
        style={{
          display: "flex",
          justifyContent: "space-between",
          alignItems: "center",
          marginBottom: "0.4rem",
        }}
      >
        <h3
          style={{
            fontSize: "0.9rem",
            fontWeight: 500,
            color: "var(--text)",
          }}
        >
          Linea de Tiempo Unificada (2005-2024)
        </h3>
        <span
          style={{
            fontFamily: "monospace",
            fontSize: "0.5rem",
            color: "var(--dim)",
          }}
        >
          CLICK EN PUNTOS - ARRASTRA PARA NAVEGAR
        </span>
      </div>

      <div
        ref={scrollRef}
        onMouseDown={handleDown}
        onMouseUp={handleUp}
        onMouseLeave={handleUp}
        onMouseMove={handleMove}
        style={{
          overflowX: "auto",
          cursor: dragging ? "grabbing" : "grab",
          userSelect: "none",
          padding: "0.5rem 0 1rem",
        }}
      >
        <div
          style={{
            position: "relative",
            width: Math.max(1400, filtered.length * 70),
            height: 210,
          }}
        >
          {/* Lane labels on the left */}
          {Object.values(ATTACKS)
            .filter((a) => filters.includes(a.id))
            .map((a) => {
              const laneY =
                a.id === "stuxnet" ? 30 : a.id === "wannacry" ? 60 : 85;
              return (
                <div
                  key={a.id + "-label"}
                  style={{
                    position: "absolute",
                    left: -2,
                    top: 100 - laneY - 5,
                    fontFamily: "monospace",
                    fontSize: "0.45rem",
                    color: a.color,
                    opacity: 0.5,
                    letterSpacing: "0.08em",
                    writingMode: "vertical-rl",
                    transform: "rotate(180deg)",
                  }}
                >
                  {a.name.toUpperCase()}
                </div>
              );
            })}

          {years.map((yr) => (
            <div
              key={yr}
              style={{
                position: "absolute",
                left: ((yr - minY) / range) * 100 + "%",
                top: 80,
                height: 32,
                width: 1,
                background: yr % 5 === 0 ? "var(--dim)" : "var(--bdr)",
                opacity: yr % 5 === 0 ? 0.4 : 0.2,
              }}
            >
              <span
                style={{
                  position: "absolute",
                  top: 36,
                  left: -14,
                  fontFamily: "monospace",
                  fontSize: yr % 5 === 0 ? "0.6rem" : "0.45rem",
                  fontWeight: yr % 5 === 0 ? 600 : 400,
                  color: "var(--dim)",
                  width: 28,
                  textAlign: "center",
                }}
              >
                {yr}
              </span>
            </div>
          ))}

          <div
            style={{
              position: "absolute",
              left: 0,
              right: 0,
              top: 98,
              height: 2,
              background: "var(--bdr)",
            }}
          />

          {filtered.map((ev) => {
            const xPct = ((ev.y - minY) / range) * 100;
            const color = ATTACKS[ev.attack].color;
            const isSel = selected === ev.id;
            const yOffset =
              ev.attack === "stuxnet"
                ? 25
                : ev.attack === "wannacry"
                ? 52
                : 75;

            return (
              <div
                key={ev.id}
                onClick={() => setSelected(isSel ? null : ev.id)}
                style={{
                  position: "absolute",
                  left: xPct + "%",
                  top: 99 - yOffset,
                  cursor: "pointer",
                  zIndex: isSel ? 10 : 1,
                  transition: "all 0.3s",
                }}
              >
                <div
                  style={{
                    position: "absolute",
                    left: ev.major ? 6 : 4,
                    top: ev.major ? 14 : 10,
                    width: 1,
                    height: yOffset - (ev.major ? 5 : 3),
                    background: color + "40",
                  }}
                />
                <div
                  style={{
                    width: ev.major ? 14 : 10,
                    height: ev.major ? 14 : 10,
                    borderRadius: "50%",
                    background: ev.major ? color : "transparent",
                    border: "2px solid " + color,
                    boxShadow: isSel
                      ? "0 0 14px " + color
                      : ev.major
                      ? "0 0 6px " + color
                      : "none",
                    transform: isSel ? "scale(1.5)" : "scale(1)",
                    transition: "all 0.3s",
                  }}
                />
                {isSel && (
                  <div
                    style={{
                      position: "absolute",
                      top: -80,
                      left: -95,
                      width: 220,
                      padding: "0.5rem",
                      background: "var(--card)",
                      border: "1px solid " + color + "40",
                      borderRadius: 8,
                      boxShadow: "0 8px 24px rgba(0,0,0,0.5)",
                      zIndex: 20,
                    }}
                  >
                    <div
                      style={{
                        fontFamily: "monospace",
                        fontSize: "0.5rem",
                        color: color,
                      }}
                    >
                      [{ATTACKS[ev.attack].flag}] {ev.date}
                    </div>
                    <div
                      style={{
                        fontSize: "0.7rem",
                        fontWeight: 600,
                        color: "var(--text)",
                        lineHeight: 1.3,
                        marginTop: 2,
                      }}
                    >
                      {ev.title}
                    </div>
                    <div
                      style={{
                        fontSize: "0.62rem",
                        color: "var(--dim)",
                        marginTop: 3,
                        lineHeight: 1.4,
                      }}
                    >
                      {ev.desc}
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>

      <div
        style={{
          display: "flex",
          gap: "1rem",
          justifyContent: "center",
          flexWrap: "wrap",
        }}
      >
        {Object.values(ATTACKS)
          .filter((a) => filters.includes(a.id))
          .map((a) => (
            <div
              key={a.id}
              style={{
                display: "flex",
                alignItems: "center",
                gap: 5,
                fontFamily: "monospace",
                fontSize: "0.6rem",
                color: "var(--dim)",
              }}
            >
              <div
                style={{
                  width: 8,
                  height: 8,
                  borderRadius: "50%",
                  background: a.color,
                  boxShadow: "0 0 6px " + a.color,
                }}
              />
              [{a.flag}] {a.name}
            </div>
          ))}
      </div>
    </div>
  );
}

          style={{
            fontFamily: "monospace",
            fontSize: "0.55rem",
            letterSpacing: "0.15em",
            color: a.color,
            marginBottom: "0.5rem",
          }}
        >
          MITRE ATT&CK - {a.name} ({d.mitre})
        </div>
        <div
          style={{
            display: "flex",
            justifyContent: "space-between",
            alignItems: "center",
            marginBottom: "0.6rem",
          }}
        >
          <p
            style={{
              fontSize: "0.65rem",
              color: "var(--dim)",
              opacity: 0.7,
              margin: 0,
            }}
          >
            Click en cada tecnica para ver como fue aplicada en {a.name}
          </p>
          <button
            onClick={() => setMitreExpand(!mitreExpand)}
            style={{
              fontFamily: "monospace",
              fontSize: "0.52rem",
              padding: "0.2rem 0.5rem",
              borderRadius: 4,
              border: "1px solid " + a.color + "40",
              background: "transparent",
              color: a.color,
              cursor: "pointer",
              whiteSpace: "nowrap",
            }}
          >
            {mitreExpand ? "COLAPSAR TODAS" : "EXPANDIR TODAS"}
          </button>
        </div>
        <div
          style={{
            display: "flex",
            flexWrap: "wrap",
            gap: "0.3rem",
            alignItems: "flex-start",
          }}
        >
          {d.mitreTags.map((t, i) => (
            <MitreTag key={i} tag={t} color={a.color} forceOpen={mitreExpand} />
          ))}
        </div>
      </div>
    </div>
  );
}

// ============================================================
// MAIN APP
// ============================================================

function App() {
  const [filters, setFilters] = useState([
    "stuxnet",
    "wannacry",
    "solarwinds",
  ]);
  const [view, setView] = useState("timeline");
  const [showHero, setShowHero] = useState(true);
  const [dark, setDark] = useState(true);

  function toggleFilter(key) {
    if (filters.length === 1 && filters[0] === key) {
      return;
    }
    if (filters.includes(key)) {
      setFilters(filters.filter((f) => f !== key));
    } else {
      setFilters([...filters, key]);
    }
  }

  const themeVars = dark
    ? {
        "--bg": "#0a0a0f",
        "--card": "#12121a",
        "--bdr": "rgba(255,255,255,0.07)",
        "--text": "#e8e8f0",
        "--dim": "#8888a0",
      }
    : {
        "--bg": "#f4f4f7",
        "--card": "#ffffff",
        "--bdr": "rgba(0,0,0,0.08)",
        "--text": "#1a1a2e",
        "--dim": "#666680",
      };

  const attackKeys = ["stuxnet", "wannacry", "solarwinds"];

  return (
    <div
      style={{
        minHeight: "100vh",
        background: "var(--bg)",
        color: "var(--text)",
        fontFamily: "'Segoe UI', system-ui, sans-serif",
        ...themeVars,
      }}
    >
      <style>
        {`
          @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
          }
          @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
          }
          @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(0,229,160,0.12); }
            50% { box-shadow: 0 0 40px rgba(0,229,160,0.25); }
          }
          ::-webkit-scrollbar { height: 5px; width: 5px; }
          ::-webkit-scrollbar-thumb { background: var(--bdr); border-radius: 3px; }
        `}
      </style>

      {/* ========== HERO ========== */}
      {showHero && (
        <div
          style={{
            minHeight: "100vh",
            display: "flex",
            flexDirection: "column",
            justifyContent: "center",
            alignItems: "center",
            textAlign: "center",
            padding: "2rem",
            position: "relative",
            animation: "fadeIn 0.8s ease",
          }}
        >
          <div
            style={{
              position: "absolute",
              inset: 0,
              pointerEvents: "none",
              background:
                "radial-gradient(ellipse 500px 350px at 20% 50%, rgba(0,229,160,0.06) 0%, transparent 70%), radial-gradient(ellipse 500px 350px at 50% 60%, rgba(255,51,102,0.04) 0%, transparent 70%), radial-gradient(ellipse 500px 350px at 80% 40%, rgba(255,170,0,0.04) 0%, transparent 70%)",
            }}
          />

          <div
            style={{
              fontFamily: "monospace",
              fontSize: "0.58rem",
              letterSpacing: "0.3em",
              color: "var(--dim)",
              marginBottom: "1.5rem",
              textTransform: "uppercase",
              position: "relative",
            }}
          >
            Tecnicas de Ciberdefensa y Ciberataque - Tarea 3
          </div>

          <h1
            style={{
              fontSize: "clamp(1.8rem, 5.5vw, 3.5rem)",
              fontWeight: 300,
              lineHeight: 1.15,
              maxWidth: 680,
              marginBottom: "1rem",
              position: "relative",
              letterSpacing: "-0.02em",
            }}
          >
            Cronologia de la{" "}
            <span style={{ color: "#00e5a0", fontStyle: "italic" }}>
              Ciberguerra
            </span>{" "}
            Moderna
          </h1>

          <p
            style={{
              fontSize: "0.92rem",
              color: "var(--dim)",
              maxWidth: 500,
              marginBottom: "2.5rem",
              position: "relative",
              lineHeight: 1.7,
            }}
          >
            Tres ciberataques que redefinieron la guerra digital, el derecho
            internacional y la arquitectura de seguridad global.
          </p>

          <div
            style={{
              display: "flex",
              gap: "1.3rem",
              flexWrap: "wrap",
              justifyContent: "center",
              position: "relative",
              marginBottom: "2.5rem",
            }}
          >
            {Object.values(ATTACKS).map((a) => (
              <div
                key={a.id}
                style={{
                  display: "flex",
                  alignItems: "center",
                  gap: 6,
                  fontFamily: "monospace",
                  fontSize: "0.75rem",
                }}
              >
                <div
                  style={{
                    width: 10,
                    height: 10,
                    borderRadius: "50%",
                    background: a.color,
                    boxShadow: "0 0 10px " + a.color,
                  }}
                />
                [{a.flag}] {a.name} | {a.year}
              </div>
            ))}
          </div>

          <button
            onClick={() => setShowHero(false)}
            style={{
              fontFamily: "monospace",
              fontSize: "0.68rem",
              letterSpacing: "0.1em",
              padding: "0.75rem 2rem",
              border: "1px solid rgba(0,229,160,0.3)",
              borderRadius: 8,
              background: "rgba(0,229,160,0.06)",
              color: "#00e5a0",
              cursor: "pointer",
              transition: "all 0.3s",
              position: "relative",
              animation: "glow 3s infinite",
            }}
            onMouseEnter={(e) => {
              e.target.style.background = "rgba(0,229,160,0.15)";
              e.target.style.transform = "scale(1.05)";
            }}
            onMouseLeave={(e) => {
              e.target.style.background = "rgba(0,229,160,0.06)";
              e.target.style.transform = "scale(1)";
            }}
          >
            {"EXPLORAR LINEA DE TIEMPO ->"}
          </button>

          <div
            style={{
              position: "absolute",
              bottom: "2rem",
              fontFamily: "monospace",
              fontSize: "0.52rem",
              color: "var(--dim)",
              animation: "pulse 2s infinite",
            }}
          >
            Maestria en Ciberseguridad | UEES / INISEG | Abril 2026
          </div>
        </div>
      )}

      {/* ========== MAIN CONTENT ========== */}
      {!showHero && (
        <div style={{ animation: "fadeIn 0.4s ease" }}>
          {/* Toolbar */}
          <div
            style={{
              position: "sticky",
              top: 0,
              zIndex: 100,
              background: dark
                ? "rgba(10,10,15,0.93)"
                : "rgba(244,244,247,0.95)",
              backdropFilter: "blur(12px)",
              borderBottom: "1px solid var(--bdr)",
              padding: "0.45rem 1rem",
              display: "flex",
              justifyContent: "space-between",
              alignItems: "center",
              flexWrap: "wrap",
              gap: "0.4rem",
            }}
          >
            <div
              style={{
                display: "flex",
                gap: "0.35rem",
                alignItems: "center",
              }}
            >
              <span
                style={{
                  fontFamily: "monospace",
                  fontSize: "0.5rem",
                  color: "var(--dim)",
                  marginRight: 2,
                }}
              >
                FILTRO:
              </span>
              {Object.values(ATTACKS).map((a) => {
                const isOn = filters.includes(a.id);
                return (
                  <button
                    key={a.id}
                    onClick={() => toggleFilter(a.id)}
                    style={{
                      fontFamily: "monospace",
                      fontSize: "0.55rem",
                      padding: "0.2rem 0.5rem",
                      borderRadius: 20,
                      border:
                        "1px solid " + (isOn ? a.color : "var(--bdr)"),
                      background: isOn ? a.color + "18" : "transparent",
                      color: isOn ? a.color : "var(--dim)",
                      cursor: "pointer",
                      transition: "all 0.2s",
                    }}
                  >
                    [{a.flag}] {a.name}
                  </button>
                );
              })}
            </div>

            <div
              style={{
                display: "flex",
                gap: 5,
                alignItems: "center",
              }}
            >
              <div
                style={{
                  display: "flex",
                  border: "2px solid var(--bdr)",
                  borderRadius: 8,
                  overflow: "hidden",
                }}
              >
                {[
                  ["timeline", "CRONOLOGIA"],
                  ["compare", "COMPARATIVA"],
                ].map(([v, l]) => {
                  const isActive = view === v;
                  const activeColor = v === "timeline" ? "#00e5a0" : "#ffaa00";
                  return (
                    <button
                      key={v}
                      onClick={() => setView(v)}
                      style={{
                        fontFamily: "monospace",
                        fontSize: "0.62rem",
                        fontWeight: isActive ? 700 : 400,
                        letterSpacing: "0.1em",
                        padding: "0.4rem 1rem",
                        border: "none",
                        background: isActive
                          ? activeColor + "20"
                          : "transparent",
                        color: isActive ? activeColor : "var(--dim)",
                        cursor: "pointer",
                        transition: "all 0.2s",
                        borderRight:
                          v === "timeline"
                            ? "1px solid var(--bdr)"
                            : "none",
                      }}
                    >
                      {isActive ? ">> " : ""}
                      {l}
                      {isActive ? " <<" : ""}
                    </button>
                  );
                })}
              </div>
              <button
                onClick={() => setDark(!dark)}
                style={{
                  fontSize: "0.7rem",
                  padding: "0.2rem 0.4rem",
                  border: "1px solid var(--bdr)",
                  borderRadius: 6,
                  background: "transparent",
                  cursor: "pointer",
                  color: "var(--dim)",
                }}
                title={dark ? "Modo claro" : "Modo oscuro"}
              >
                {dark ? "SUN" : "MOON"}
              </button>
            </div>
          </div>

          {/* Content area */}
          <div
            style={{
              maxWidth: 900,
              margin: "0 auto",
              padding: "1.5rem 1.2rem",
            }}
          >
            {view === "timeline" && (
              <>
                <HorizontalTimeline filters={filters} />
                <EvolutionSection />
                {attackKeys.map((k) => (
                  <AttackDetailSection
                    key={k}
                    attackKey={k}
                    filters={filters}
                  />
                ))}
              </>
            )}

            {view === "compare" && (
              <div>
                <h2
                  style={{
                    fontSize: "1.3rem",
                    fontWeight: 300,
                    textAlign: "center",
                    marginBottom: "0.3rem",
                  }}
                >
                  Analisis Comparativo
                </h2>
                <p
                  style={{
                    textAlign: "center",
                    fontSize: "0.72rem",
                    color: "var(--dim)",
                    marginBottom: "1.5rem",
                  }}
                >
                  Comparacion de los tres ciberataques segun multiples dimensiones de analisis
                </p>
                <div style={{ overflowX: "auto" }}>
                  <table
                    style={{
                      width: "100%",
                      borderCollapse: "collapse",
                      fontSize: "0.78rem",
                    }}
                  >
                    <thead>
                      <tr>
                        <th
                          style={{
                            padding: "1rem 0.8rem",
                            textAlign: "left",
                            borderBottom: "2px solid var(--bdr)",
                            fontFamily: "monospace",
                            fontSize: "0.7rem",
                            fontWeight: 600,
                            letterSpacing: "0.08em",
                            color: "var(--dim)",
                            verticalAlign: "bottom",
                          }}
                        >
                          Dimension
                        </th>
                        {Object.values(ATTACKS)
                          .filter((a) => filters.includes(a.id))
                          .map((a) => (
                            <th
                              key={a.id}
                              style={{
                                padding: "1rem 0.8rem",
                                textAlign: "left",
                                borderBottom: "2px solid " + a.color + "40",
                                verticalAlign: "bottom",
                              }}
                            >
                              <div
                                style={{
                                  fontFamily: "monospace",
                                  fontSize: "0.55rem",
                                  color: a.color,
                                  opacity: 0.6,
                                  marginBottom: 2,
                                }}
                              >
                                [{a.flag}]
                              </div>
                              <div
                                style={{
                                  fontSize: "0.9rem",
                                  fontWeight: 700,
                                  color: a.color,
                                  letterSpacing: "0.02em",
                                }}
                              >
                                {a.name}
                              </div>
                              <div
                                style={{
                                  fontFamily: "monospace",
                                  fontSize: "0.55rem",
                                  color: "var(--dim)",
                                  marginTop: 2,
                                }}
                              >
                                {a.year} | {a.paradigm}
                              </div>
                            </th>
                          ))}
                      </tr>
                    </thead>
                    <tbody>
                      {COMPARE_ROWS.map((row, i) => {
                        const colIndices = [0, 1, 2].filter((ci) =>
                          filters.includes(attackKeys[ci])
                        );
                        return (
                          <tr
                            key={i}
                            style={{
                              borderBottom: "1px solid var(--bdr)",
                              transition: "background 0.2s",
                            }}
                            onMouseEnter={(e) => {
                              e.currentTarget.style.background = dark
                                ? "rgba(255,255,255,0.03)"
                                : "rgba(0,0,0,0.03)";
                            }}
                            onMouseLeave={(e) => {
                              e.currentTarget.style.background =
                                "transparent";
                            }}
                          >
                            <td
                              style={{
                                padding: "0.75rem 0.8rem",
                                fontWeight: 600,
                                fontSize: "0.8rem",
                                color: "var(--text)",
                                whiteSpace: "nowrap",
                              }}
                            >
                              {row[0]}
                            </td>
                            {colIndices.map((ci) => (
                              <td
                                key={ci}
                                style={{
                                  padding: "0.75rem 0.8rem",
                                  color: "var(--dim)",
                                  lineHeight: 1.55,
                                  fontSize: "0.78rem",
                                }}
                              >
                                {row[ci + 1]}
                              </td>
                            ))}
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {/* References */}
            <div
              style={{
                marginTop: "2rem",
                padding: "1.1rem",
                background: "var(--card)",
                borderRadius: 12,
                border: "1px solid var(--bdr)",
              }}
            >
              <h3
                style={{
                  fontSize: "0.85rem",
                  fontWeight: 400,
                  marginBottom: "0.7rem",
                  textAlign: "center",
                }}
              >
                Referencias Academicas
              </h3>
              <div
                style={{
                  columns: 2,
                  columnGap: "1.5rem",
                  fontSize: "0.62rem",
                  color: "var(--dim)",
                  lineHeight: 1.9,
                }}
              >
                {REFS.map((r, i) => (
                  <p
                    key={i}
                    style={{ breakInside: "avoid", marginBottom: 2 }}
                  >
                    {i + 1}. {r}
                  </p>
                ))}
              </div>
            </div>

            {/* Footer */}
            <div
              style={{
                textAlign: "center",
                padding: "1.5rem 0 1rem",
                fontSize: "0.6rem",
                color: "var(--dim)",
              }}
            >
              <strong style={{ color: "var(--text)" }}>
                Maestria en Ciberseguridad, Analisis e Ingenieria - UEES /
                INISEG
              </strong>
              <br />
              Tecnicas de Ciberdefensa y Ciberataque | Tarea 3 | Abril 2026
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
