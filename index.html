// ====== HOOKS ======
function useCounter(target, dur, active) {
  const [val, setVal] = useState(0);
  const started = useRef(false);
  useEffect(() => {
    if (!active || started.current) return;
    started.current = true;
    const s = performance.now();
    const d = dur || 1600;
    function step(now) {
      const p = Math.min((now - s) / d, 1);
      setVal(Math.round(target * (1 - Math.pow(1 - p, 3))));
      if (p < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }, [active, target, dur]);
  return val;
}

function useInView() {
  const ref = useRef(null);
  const [vis, setVis] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      (entries) => { if (entries[0].isIntersecting) setVis(true); },
      { threshold: 0.15 }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return [ref, vis];
}

// ====== SMALL COMPONENTS ======
function Stat({ v, l, p, s, color, active }) {
  const anim = useCounter(v, 1600, active);
  return (
    <div style={{ textAlign: "center", padding: "0.9rem 0.4rem", background: "var(--card)", borderRadius: 10, border: "1px solid var(--bdr)" }}>
      <div style={{ fontFamily: "monospace", fontSize: "1.3rem", fontWeight: 700, color }}>{p || ""}{v >= 1000 ? (anim/1000).toFixed(anim%1000===0?0:1)+"K" : anim}{s || ""}</div>
      <div style={{ fontSize: "0.58rem", color: "var(--dim)", marginTop: 4 }}>{l}</div>
    </div>
  );
}

function MTag({ tag, color, forceOpen }) {
  const [open, setOpen] = useState(false);
  const show = forceOpen || open;
  return (
    <div style={{ display: "inline-block" }}>
      <span onClick={() => setOpen(!open)} style={{ fontFamily: "monospace", fontSize: "0.56rem", padding: "0.22rem 0.45rem", borderRadius: 4, border: "1px solid " + (show ? color : "var(--bdr)"), color: show ? color : "var(--dim)", background: show ? color + "15" : "transparent", cursor: "pointer", transition: "all 0.2s", display: "inline-block", userSelect: "none" }}>
        <span style={{ color, fontWeight: 700 }}>{tag.c}</span> {tag.n} <span style={{ fontSize: "0.45rem", opacity: 0.6 }}>{show ? "[-]" : "[+]"}</span>
      </span>
      {show && (
        <div style={{ marginTop: 4, marginBottom: 6, padding: "0.45rem 0.6rem", background: color + "08", borderLeft: "2px solid " + color, borderRadius: "0 6px 6px 0", fontSize: "0.68rem", color: "var(--dim)", lineHeight: 1.6, maxWidth: 480 }}>
          <div style={{ fontFamily: "monospace", fontSize: "0.48rem", color, marginBottom: 2, letterSpacing: "0.06em" }}>{tag.c} | {tag.n}</div>
          {tag.d}
        </div>
      )}
    </div>
  );
}

function VEvent({ ev, color, isOpen, onClick }) {
  return (
    <div onClick={onClick} style={{ cursor: "pointer", position: "relative", paddingLeft: "1.8rem", marginBottom: "0.5rem" }}>
      <div style={{ position: "absolute", left: 0, top: 6, width: ev.m ? 13 : 9, height: ev.m ? 13 : 9, borderRadius: "50%", background: ev.m ? color : "transparent", border: "2px solid " + color, boxShadow: ev.m ? "0 0 7px " + color : "none", transition: "all 0.3s", transform: isOpen ? "scale(1.3)" : "scale(1)" }} />
      <div style={{ fontFamily: "monospace", fontSize: "0.58rem", color }}>{ev.date}</div>
      <div style={{ fontWeight: 600, fontSize: "0.82rem", marginTop: 1, color: "var(--text)" }}>{ev.t}</div>
      <div style={{ maxHeight: isOpen ? 200 : 0, overflow: "hidden", transition: "max-height 0.4s ease, opacity 0.3s", opacity: isOpen ? 1 : 0, marginTop: isOpen ? 4 : 0 }}>
        <div style={{ fontSize: "0.74rem", color: "var(--dim)", lineHeight: 1.6, padding: "0.35rem 0.6rem", background: color + "10", borderRadius: 8, borderLeft: "2px solid " + color }}>{ev.d}</div>
      </div>
    </div>
  );
}

// ====== HORIZONTAL TIMELINE (reusable) ======
function HTimeline({ events, colors, minYear, maxYear, height, label }) {
  const ref = useRef(null);
  const range = maxYear - minYear;
  const [sel, setSel] = useState(null);
  const [drag, setDrag] = useState(false);
  const sx = useRef(0);
  const sl = useRef(0);

  function onD(e) { setDrag(true); sx.current = e.pageX - ref.current.offsetLeft; sl.current = ref.current.scrollLeft; }
  function onU() { setDrag(false); }
  function onM(e) { if (!drag) return; e.preventDefault(); ref.current.scrollLeft = sl.current - (e.pageX - ref.current.offsetLeft - sx.current); }

  const years = [];
  for (let yr = minYear; yr <= maxYear; yr++) years.push(yr);
  const h = height || 160;
  const lineY = h * 0.55;

  return (
    <div style={{ marginBottom: "1.5rem" }}>
      {label && (
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "0.35rem" }}>
          <h3 style={{ fontSize: "0.88rem", fontWeight: 500, color: "var(--text)" }}>{label}</h3>
          <span style={{ fontFamily: "monospace", fontSize: "0.48rem", color: "var(--dim)" }}>CLICK EN PUNTOS | ARRASTRA PARA NAVEGAR</span>
        </div>
      )}
      <div ref={ref} onMouseDown={onD} onMouseUp={onU} onMouseLeave={onU} onMouseMove={onM}
        style={{ overflowX: "auto", overflowY: "visible", cursor: drag ? "grabbing" : "grab", userSelect: "none", padding: "7rem 2rem 0.5rem 1rem" }}>
        <div style={{ position: "relative", width: Math.max(900, events.length * 80), height: h }}>
          {/* Year markers */}
          {years.map((yr) => {
            const big = yr % 5 === 0;
            return (
              <div key={yr} style={{ position: "absolute", left: ((yr - minYear) / range) * 100 + "%", top: lineY - 10, height: 24, width: 1, background: "var(--bdr)", opacity: big ? 0.5 : 0.2 }}>
                <span style={{ position: "absolute", top: 28, left: -14, fontFamily: "monospace", fontSize: big ? "0.58rem" : "0.42rem", fontWeight: big ? 600 : 400, color: "var(--dim)", width: 28, textAlign: "center" }}>{yr}</span>
              </div>
            );
          })}
          {/* Main line */}
          <div style={{ position: "absolute", left: 0, right: 0, top: lineY, height: 2, background: "var(--bdr)" }} />
          {/* Event dots */}
          {events.map((ev) => {
            const xPct = ((ev.y - minYear) / range) * 100;
            const color = colors ? colors[ev.a] || ATK[ev.a].color : ATK[ev.a].color;
            const isSel = sel === ev.id;
            const attackKeys = Object.keys(ATK);
            const laneIdx = attackKeys.indexOf(ev.a);
            const yOff = colors ? [22, 45, 65][laneIdx] || 30 : 30;
            const dotTop = lineY - yOff;
            const isLeftEdge = xPct < 12;
            const isRightEdge = xPct > 88;

            return (
              <div key={ev.id} onClick={() => setSel(isSel ? null : ev.id)}
                style={{ position: "absolute", left: xPct + "%", top: dotTop, cursor: "pointer", zIndex: isSel ? 10 : 1, transition: "all 0.3s" }}>
                {/* Connector */}
                <div style={{ position: "absolute", left: ev.m ? 6 : 4, top: ev.m ? 13 : 9, width: 1, height: yOff - (ev.m ? 4 : 2), background: color + "40" }} />
                {/* Dot */}
                <div style={{ width: ev.m ? 14 : 10, height: ev.m ? 14 : 10, borderRadius: "50%", background: ev.m ? color : "transparent", border: "2px solid " + color, boxShadow: isSel ? "0 0 14px " + color : ev.m ? "0 0 6px " + color : "none", transform: isSel ? "scale(1.5)" : "scale(1)", transition: "all 0.3s" }} />
                {/* Tooltip - smart positioning */}
                {isSel && (
                  <div style={{
                    position: "absolute",
                    top: -100,
                    left: isLeftEdge ? 5 : isRightEdge ? -260 : -120,
                    width: 270,
                    padding: "0.6rem 0.7rem",
                    background: "var(--card)",
                    border: "1px solid " + color + "50",
                    borderRadius: 8,
                    boxShadow: "0 8px 24px rgba(0,0,0,0.6)",
                    zIndex: 20,
                  }}>
                    <div style={{ fontFamily: "monospace", fontSize: "0.5rem", color }}>
                      {ATK[ev.a] ? "[" + ATK[ev.a].flag + "] " : ""}{ev.date}
                    </div>
                    <div style={{ fontSize: "0.72rem", fontWeight: 600, color: "var(--text)", lineHeight: 1.35, marginTop: 3 }}>{ev.t}</div>
                    <div style={{ fontSize: "0.64rem", color: "var(--dim)", marginTop: 4, lineHeight: 1.5 }}>{ev.d}</div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

          <div style={{ display: "flex", gap: "1.3rem", flexWrap: "wrap", justifyContent: "center", position: "relative", marginBottom: "2.5rem" }}>
            {Object.values(ATK).map((a) => (
              <div key={a.id} style={{ display: "flex", alignItems: "center", gap: 6, fontFamily: "monospace", fontSize: "0.72rem" }}>
                <div style={{ width: 10, height: 10, borderRadius: "50%", background: a.color, boxShadow: "0 0 10px " + a.color }} />
                [{a.flag}] {a.name} | {a.year}
              </div>
            ))}
          </div>
          <button onClick={() => setPage("overview")}
            style={{ fontFamily: "monospace", fontSize: "0.66rem", letterSpacing: "0.1em", padding: "0.75rem 2rem", border: "1px solid rgba(0,229,160,0.3)", borderRadius: 8, background: "rgba(0,229,160,0.06)", color: "#00e5a0", cursor: "pointer", transition: "all 0.3s", position: "relative", animation: "glow 3s infinite" }}
            onMouseEnter={(e) => { e.target.style.background = "rgba(0,229,160,0.15)"; e.target.style.transform = "scale(1.05)"; }}
            onMouseLeave={(e) => { e.target.style.background = "rgba(0,229,160,0.06)"; e.target.style.transform = "scale(1)"; }}>
            {"EXPLORAR LINEA DE TIEMPO ->"}
          </button>
          <div style={{ position: "absolute", bottom: "2rem", fontFamily: "monospace", fontSize: "0.5rem", color: "var(--dim)", animation: "pulse 2s infinite" }}>
            Maestria en Ciberseguridad | UEES | Abril 2026
          </div>
        </div>
      )}

      {/* MAIN CONTENT */}
      {page !== "hero" && (
        <div style={{ animation: "fadeIn 0.4s" }}>
          {/* NAV BAR */}
          <div style={{ position: "sticky", top: 0, zIndex: 100, background: dark ? "rgba(10,10,15,0.94)" : "rgba(244,244,247,0.95)", backdropFilter: "blur(12px)", borderBottom: "1px solid var(--bdr)", padding: "0", display: "flex", justifyContent: "space-between", alignItems: "stretch" }}>
            <div style={{ display: "flex", flex: 1 }}>
              {navItems.map((item) => {
                const active = page === item.key;
                return (
                  <button key={item.key} onClick={() => setPage(item.key)}
                    style={{
                      flex: 1,
                      fontFamily: "monospace",
                      fontSize: "0.6rem",
                      fontWeight: active ? 700 : 400,
                      letterSpacing: "0.1em",
                      padding: "0.7rem 0.5rem",
                      border: "none",
                      borderBottom: active ? "3px solid " + item.color : "3px solid transparent",
                      background: active ? item.color + "10" : "transparent",
                      color: active ? item.color : "var(--dim)",
                      cursor: "pointer",
                      transition: "all 0.2s",
                    }}>
                    {item.label}
                  </button>
                );
              })}
            </div>
            <button onClick={() => setDark(!dark)}
              style={{ fontSize: "0.65rem", padding: "0 0.7rem", border: "none", borderLeft: "1px solid var(--bdr)", background: "transparent", cursor: "pointer", color: "var(--dim)" }}>
              {dark ? "SUN" : "MOON"}
            </button>
          </div>

          {/* CONTENT */}
          <div style={{ maxWidth: 920, margin: "0 auto", padding: "1.5rem 1.2rem" }}>
            {page === "overview" && <OverviewPage />}
            {page === "stuxnet" && <AttackPage ak="stuxnet" />}
            {page === "wannacry" && <AttackPage ak="wannacry" />}
            {page === "solarwinds" && <AttackPage ak="solarwinds" />}

            {/* Footer */}
            <div style={{ textAlign: "center", padding: "1.5rem 0 1rem", fontSize: "0.58rem", color: "var(--dim)", borderTop: "1px solid var(--bdr)", marginTop: "2rem" }}>
              <strong style={{ color: "var(--text)" }}>Maestria en Ciberseguridad - UEES</strong><br />
              Tecnicas de Ciberdefensa y Ciberataque | Tarea 3 | Abril 2026
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
